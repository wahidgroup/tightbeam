name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [master]

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
          requireScope: false
          subjectPattern: ^([A-Z]|v?\d).+[^.]$
          subjectPatternError: |
            Subject MUST start with an uppercase letter (or a version like
            v1.2.3 for release PRs) and MUST NOT end with a period.
            Example: "feat(scope): Add new feature"
