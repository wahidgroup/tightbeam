name: Release

on:
  push:
    tags:
      - 'releases/v*'
      - 'releases/derive/v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Derive-only release
      - name: Publish tightbeam-derive
        if: startsWith(github.ref, 'refs/tags/releases/derive/')
        run: cargo publish --package tightbeam-derive
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Workspace release: publish derive first (skip if version already on crates.io)
      - name: Publish tightbeam-derive (if needed)
        if: startsWith(github.ref, 'refs/tags/releases/v')
        run: |
          local_version=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "tightbeam-derive") | .version')
          published_version=$(cargo search tightbeam-derive --limit 1 \
            | head -1 | sed 's/.*= "\(.*\)".*/\1/')
          if [ "$local_version" = "$published_version" ]; then
            echo "tightbeam-derive ${local_version} already on crates.io, skipping"
          else
            echo "Publishing tightbeam-derive ${local_version} (crates.io has ${published_version})"
            cargo publish --package tightbeam-derive
            echo "Waiting for crates.io index..."
            sleep 30
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish tightbeam-rs
        if: startsWith(github.ref, 'refs/tags/releases/v')
        run: cargo publish --package tightbeam-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract release metadata
        id: meta
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if [[ "$tag" == releases/derive/* ]]; then
            version="${tag#releases/derive/}"
            title="tightbeam-derive ${version}"
          else
            version="${tag#releases/}"
            title="tightbeam ${version}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "title=${title}" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "${{ steps.meta.outputs.title }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
