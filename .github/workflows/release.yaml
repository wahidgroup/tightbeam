name: Release

on:
  push:
    tags:
      - 'releases/v*'
      - 'releases/derive/v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Derive-only release
      - name: Publish tightbeam-derive
        if: startsWith(github.ref, 'refs/tags/releases/derive/')
        run: cargo publish --package tightbeam-derive
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Workspace release: publish derive first (skip if version already on crates.io)
      - name: Publish tightbeam-derive (if needed)
        if: startsWith(github.ref, 'refs/tags/releases/v')
        run: |
          output=$(cargo publish --package tightbeam-derive 2>&1) && exit 0
          if echo "$output" | grep -q "already uploaded"; then
            echo "tightbeam-derive already published, skipping"
          else
            echo "$output" >&2
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        if: startsWith(github.ref, 'refs/tags/releases/v')
        run: sleep 30

      - name: Publish tightbeam-rs
        if: startsWith(github.ref, 'refs/tags/releases/v')
        run: cargo publish --package tightbeam-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
