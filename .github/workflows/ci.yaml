name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - uses: Swatinem/rust-cache@v2
    - name: Run linters
      run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - "testing,std,tcp,tokio"
          - "testing,aes-gcm,sha3,secp256k1"
          - "testing,zstd,compress"
          - "testing,x509,signature"
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - name: Run tests
      run: make test features="${{ matrix.features }}"

  test-no-default:
    name: Test (no default features)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - name: Run tests without default features
      run: make test no-default=true features="testing"